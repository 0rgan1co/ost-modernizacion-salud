*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,sans-serif;background:#f0f4f8;color:var(--gray-900);line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-700) 60%,var(--blue-500) 100%);color:#fff;padding:10px 16px 9px;flex-shrink:0;}
.header h1{font-size:13px;font-weight:800;letter-spacing:-.2px;}
.header .sub{font-size:9px;opacity:.7;margin-top:1px;}
.outcome-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:2px 9px;font-size:9px;font-weight:600;margin-top:4px;}

/* TABS */
.tabs{background:#fff;border-bottom:2px solid var(--gray-300);display:flex;flex-shrink:0;}
.tab{flex:1;padding:9px 6px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray-500);border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab.active{color:var(--blue-700);border-color:var(--blue-600);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green-500);}
.sync-dot.offline{background:var(--gray-400);}

/* ═══════════════ PRIORITY VIEW ═══════════════ */
.prio-scroll{flex:1;overflow-y:auto;padding:10px 12px 24px;}
.prio-hint{background:linear-gradient(135deg,#ebf8ff,#e6fffa);border-radius:9px;padding:10px 13px;margin-bottom:10px;border-left:3px solid var(--blue-500);}
.prio-hint p{font-size:11px;color:var(--gray-700);line-height:1.5;}
.prio-hint strong{color:var(--blue-700);}
.prio-section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);padding:6px 2px 4px;}

/* PRIORITY CARD — expanded with desc + impact */
.prio-card{background:#fff;border-radius:10px;margin-bottom:8px;padding:11px 12px;box-shadow:var(--shadow-sm);border:1.5px solid var(--gray-200);cursor:pointer;transition:.15s;}
.prio-card.top{border-color:var(--red-300);background:#fff8f8;}
.prio-card:active{opacity:.88;}
.prio-card-row{display:flex;align-items:flex-start;gap:9px;}
.prio-rank{font-size:15px;font-weight:900;color:var(--gray-300);width:20px;text-align:center;flex-shrink:0;padding-top:1px;line-height:1;}
.prio-rank.top{color:var(--red-400);}
.prio-body{flex:1;min-width:0;}
.prio-title{font-size:12px;font-weight:700;color:var(--gray-900);line-height:1.35;}
.prio-desc{font-size:11px;color:var(--gray-600);margin-top:4px;line-height:1.45;}
.prio-impact{font-size:10px;color:var(--amber-700);background:var(--amber-100);border-radius:6px;padding:4px 8px;margin-top:5px;line-height:1.4;border-left:2px solid var(--amber-600);}
.prio-impact::before{content:"⚠️ Sin resolver: ";}
.prio-badges{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 5px;border-radius:4px;white-space:nowrap;}
.tag-pain{background:var(--red-100);color:var(--red-700);}
.tag-desire{background:var(--green-100);color:var(--green-700);}
.tag-need{background:var(--purple-100);color:var(--purple-700);}
.tag-ph1{background:var(--green-100);color:var(--green-700);}
.tag-ph2{background:var(--blue-100);color:var(--blue-700);}
.tag-ph3{background:var(--orange-100);color:var(--orange-700);}
.vote-btn{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;cursor:pointer;padding:4px 5px;border-radius:7px;transition:.15s;flex-shrink:0;}
.vote-btn:hover{background:var(--red-100);}
.vote-btn.voted{background:var(--red-100);}
.heart{font-size:18px;line-height:1;}
.vote-count{font-size:9px;font-weight:700;color:var(--gray-500);}
.vote-btn.voted .vote-count{color:var(--red-600);}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.5)}100%{transform:scale(1)}}
.vote-btn.voted .heart{animation:heartPop .3s ease;}

/* ═══════════════ TREE VIEW ═══════════════ */
.tree-view{flex:1;overflow:hidden;position:relative;background:#dde3ec;display:flex;flex-direction:column;}

/* TREE CONTROLS (toggle bar) */
.tree-controls{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--gray-300);padding:6px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.tc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);margin-right:2px;}
.tc-chip{font-family:inherit;font-size:10px;font-weight:600;padding:3px 9px;border-radius:14px;border:1.5px solid var(--gray-300);background:#fff;color:var(--gray-600);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:4px;user-select:none;}
.tc-chip.on{color:#fff;}
.tc-chip.on.layer-sol{background:var(--blue-600);border-color:var(--blue-600);}
.tc-chip.on.layer-exp{background:var(--purple-700);border-color:var(--purple-700);}
.tc-chip.on.ph1{background:#276749;border-color:#276749;}
.tc-chip.on.ph2{background:var(--blue-700);border-color:var(--blue-700);}
.tc-chip.on.ph3{background:#c05621;border-color:#c05621;}
.tc-sep{width:1px;height:18px;background:var(--gray-300);flex-shrink:0;}

/* TREE STAGE */
.tree-stage{flex:1;overflow:hidden;position:relative;cursor:grab;user-select:none;-webkit-user-select:none;}
.tree-stage.panning{cursor:grabbing;}
.tree-canvas{position:absolute;top:0;left:0;transform-origin:0 0;}
.tree-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}
.tree-nodes{position:absolute;top:0;left:0;}

/* TREE NODES */
.tn{position:absolute;border-radius:10px;cursor:pointer;transition:box-shadow .15s;font-family:'Inter',-apple-system,sans-serif;}
.tn:hover{box-shadow:0 0 0 3px rgba(66,153,225,.35);}
.tn.voted-node{box-shadow:0 0 0 3px rgba(229,62,62,.4);}
.tn.expanded-border{box-shadow:0 0 0 2px rgba(99,179,237,.65);}
.badge{font-size:8px;font-weight:600;padding:2px 5px;border-radius:3px;white-space:nowrap;}
.conf-high{background:var(--green-100);color:var(--green-700);}
.conf-med{background:var(--orange-100);color:var(--orange-700);}
.conf-low{background:var(--red-100);color:var(--red-700);}
.eff-low{background:#e0f7fa;color:#006064;}
.eff-med{background:#fff3e0;color:#e65100;}
.eff-high{background:#fce4ec;color:#c62828;}

/* ZOOM CONTROLS */
.zoom-wrap{position:absolute;bottom:12px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:10;}
.zoom-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--gray-300);background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.14);font-family:inherit;font-weight:700;color:var(--gray-700);}
.zoom-btn:active{background:var(--gray-100);}
</style>
</head>

async function loadVotes(){
  try{
    const opps=await sbFetch('/rest/v1/ost_opportunities?select=id,votes&order=id');
    const myVotes=await sbFetch('/rest/v1/ost_votes?select=opportunity_id&voter_id=eq.'+VOTER_ID);
    const mySet=new Set((myVotes||[]).map(v=>v.opportunity_id));
    votes={};
    (opps||[]).forEach(o=>{votes[o.id]={count:o.votes,voted:mySet.has(o.id)};});
    const existing=new Set((opps||[]).map(o=>o.id));
    const toInsert=DATA.opportunities.filter(o=>!existing.has(o.id)).map(o=>({id:o.id,phase_id:String(o.phase),title:o.title,type:o.type,quote:o.quote,votes:0}));
    if(toInsert.length) await sbFetch('/rest/v1/ost_opportunities',{method:'POST',body:JSON.stringify(toInsert),headers:{'Prefer':'resolution=ignore-duplicates,return=minimal'}});
    document.getElementById('syncDot').className='sync-dot';
  }catch(e){
    DATA.opportunities.forEach(o=>{if(!votes[o.id])votes[o.id]={count:0,voted:false};});
  }
  renderPrio();
}

async function doVote(oppId){
  const v=votes[oppId]||{count:0,voted:false};
  votes[oppId]={count:v.count+(v.voted?-1:1),voted:!v.voted};
  renderPrio();
  if(activeTab==='tree') renderTree();
  try{
    if(v.voted){
      await sbFetch('/rest/v1/ost_votes?opportunity_id=eq.'+oppId+'&voter_id=eq.'+VOTER_ID,{method:'DELETE'});
      await sbFetch('/rest/v1/rpc/decrement_vote',{method:'POST',body:JSON.stringify({opp_id:oppId})});
    }else{
      await sbFetch('/rest/v1/ost_votes',{method:'POST',body:JSON.stringify({opportunity_id:oppId,voter_id:VOTER_ID})});
      await sbFetch('/rest/v1/rpc/increment_vote',{method:'POST',body:JSON.stringify({opp_id:oppId})});
    }
  }catch(err){votes[oppId]=v;renderPrio();}
}

          <div class="prio-desc">${opp.desc}</div>
          <div class="prio-impact">${opp.noResolve}</div>

// ══════════════════════════════════════════
// TREE ENGINE
// ══════════════════════════════════════════
const NW=190,VG=54,HG=10;
const NH={outcome:52,phase:60,opp:76,sol:70,exp:56};

function buildTreeData(){
  return {
    id:'outcome',type:'outcome',collapsed:false,
    children:DATA.phases.map(ph=>({
      id:'ph-'+ph.id,type:'phase',phase:ph,collapsed:false,
      children:DATA.opportunities.filter(o=>o.phase===ph.id).map(opp=>({
        id:opp.id,type:'opp',opp:opp,collapsed:true,
        children:opp.solutions.map(sol=>({
          id:sol.id,type:'sol',sol:sol,collapsed:true,
          children:sol.experiments.map(exp=>({id:exp.id,type:'exp',exp:exp,collapsed:true,children:[]}))
        }))
      }))
    }))
  };
}

// Effective collapsed: respects toggle layers + phase visibility
function isCollapsed(node){
  if(node.collapsed) return true;
  if(node.type==='opp'&&!showLayers.sol) return true;
  if(node.type==='sol'&&!showLayers.exp) return true;
  return false;
}
function isVisible(node){
  if(node.type==='phase'&&!showPhases[node.phase.id]) return false;
  if(node.type==='opp'&&!showPhases[node.opp.phase]) return false;
  if(node.type==='sol'&&!showPhases[node.sol.id.charAt(1)]) return false; // e.g. S1.1A → phase 1
  if(node.type==='exp') {
    // check parent phase via id prefix
    const phNum=parseInt(node.exp.id.charAt(1));
    if(!showPhases[phNum]) return false;
  }
  return true;
}

function getVisibleChildren(node){
  if(isCollapsed(node)) return [];
  return node.children.filter(c=>isVisible(c));
}

function nh(node){return NH[node.type]||66;}

function layout(node,startX,y){
  if(!isVisible(node)){node.x=startX;node._w=0;return 0;}
  node.y=y;
  const visChildren=getVisibleChildren(node);
  if(!visChildren.length){node.x=startX;node._w=NW+HG;return NW+HG;}
  let cx=startX,totalW=0;
  visChildren.forEach(child=>{const w=layout(child,cx,y+nh(node)+VG);cx+=w;totalW+=w;});
  node.x=startX+(totalW-HG)/2-NW/2;
  node._w=Math.max(totalW,NW+HG);
  return node._w;
}

function allVisNodes(node,acc=[]){
  if(!isVisible(node)) return acc;
  acc.push(node);
  getVisibleChildren(node).forEach(c=>allVisNodes(c,acc));
  return acc;
}

function findNode(node,id){
  if(node.id===id) return node;
  for(const c of node.children){const f=findNode(c,id);if(f) return f;}
  return null;
}

// ── PAN / ZOOM ──
let zoom=1,panX=20,panY=20,isDragging=false,dragStart={x:0,y:0};
let lastTouchDist=null,lastTouchMid=null,prevTouches=[];

function applyT(){document.getElementById('treeCanvas').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;}
function zoomIn(){zoom=Math.min(3,zoom*1.2);applyT();}
function zoomOut(){zoom=Math.max(0.1,zoom/1.2);applyT();}

function fitView(){
  if(!treeRoot) return;
  const stage=document.getElementById('treeStage');
  const sw=stage.clientWidth,sh=stage.clientHeight;
  const nodes=allVisNodes(treeRoot);
  if(!nodes.length) return;
  const minX=Math.min(...nodes.map(n=>n.x));
  const maxX=Math.max(...nodes.map(n=>n.x+NW));
  const minY=Math.min(...nodes.map(n=>n.y));
  const maxY=Math.max(...nodes.map(n=>n.y+nh(n)));
  const tw=maxX-minX+40,th=maxY-minY+40;
  zoom=Math.min(sw/tw,sh/th,1.4)*0.87;
  panX=(sw-(maxX-minX)*zoom)/2-minX*zoom;
  panY=16;
  applyT();
}

function centerNode(node){
  const stage=document.getElementById('treeStage');
  panX=stage.clientWidth/2-(node.x+NW/2)*zoom;
  panY=stage.clientHeight/3-node.y*zoom;
  applyT();
}

function initPanZoom(){
  const stage=document.getElementById('treeStage');
  stage.addEventListener('mousedown',e=>{
    if(e.target.closest('.tn'))return;
    isDragging=true;dragStart={x:e.clientX-panX,y:e.clientY-panY};
    stage.classList.add('panning');
  });
  document.addEventListener('mousemove',e=>{if(!isDragging)return;panX=e.clientX-dragStart.x;panY=e.clientY-dragStart.y;applyT();});
  document.addEventListener('mouseup',()=>{isDragging=false;const s=document.getElementById('treeStage');if(s)s.classList.remove('panning');});
  stage.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(0.1,Math.min(3,zoom*(e.deltaY<0?1.12:0.9)));applyT();},{passive:false});
  stage.addEventListener('touchstart',e=>{
    prevTouches=[...e.touches].map(t=>({x:t.clientX,y:t.clientY}));
    if(e.touches.length===2){
      lastTouchDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      lastTouchMid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    }
  },{passive:true});
  stage.addEventListener('touchmove',e=>{
    e.preventDefault();
    const tArr=[...e.touches];
    if(tArr.length===2){
      const dist=Math.hypot(tArr[1].clientX-tArr[0].clientX,tArr[1].clientY-tArr[0].clientY);
      const mid={x:(tArr[0].clientX+tArr[1].clientX)/2,y:(tArr[0].clientY+tArr[1].clientY)/2};
      if(lastTouchDist) zoom=Math.max(0.1,Math.min(3,zoom*dist/lastTouchDist));
      if(lastTouchMid){panX+=mid.x-lastTouchMid.x;panY+=mid.y-lastTouchMid.y;}
      lastTouchDist=dist;lastTouchMid=mid;applyT();
    }else if(tArr.length===1&&prevTouches.length){
      panX+=tArr[0].clientX-prevTouches[0].x;panY+=tArr[0].clientY-prevTouches[0].y;applyT();
    }
    prevTouches=tArr.map(t=>({x:t.clientX,y:t.clientY}));
  },{passive:false});
  stage.addEventListener('touchend',e=>{
    prevTouches=[...e.touches].map(t=>({x:t.clientX,y:t.clientY}));
    if(e.touches.length<2){lastTouchDist=null;lastTouchMid=null;}
  },{passive:true});
}

function toggleNode(nodeId){
  if(!treeRoot) return;
  const node=findNode(treeRoot,nodeId);
  // Only toggle if layer is enabled
  if(node&&node.children.length){
    if(node.type==='opp'&&!showLayers.sol) return;
    if(node.type==='sol'&&!showLayers.exp) return;
    node.collapsed=!node.collapsed;renderTree();
  }
}

// ── RENDER TREE ──
function renderTree(){
  if(!treeRoot) treeRoot=buildTreeData();
  if(!_treeInited){_treeInited=true;initPanZoom();}

  const totalW=layout(treeRoot,20,20);
  const nodes=allVisNodes(treeRoot);
  const maxY=nodes.length?Math.max(...nodes.map(n=>n.y+nh(n)))+30:400;
  const canvasW=Math.max(totalW+40,700);

  // SVG edges
  const svg=document.getElementById('treeSvg');
  svg.setAttribute('width',canvasW);svg.setAttribute('height',maxY);
  svg.style.width=canvasW+'px';svg.style.height=maxY+'px';
  let lines='';
  function drawEdges(node){
    if(!isVisible(node)) return;
    const visChildren=getVisibleChildren(node);
    if(!visChildren.length) return;
    const px=node.x+NW/2,py=node.y+nh(node);
    const color=node.type==='phase'?phCols[node.phase.id]?.bg:(node.type==='opp'?'#94a3b8':'#cbd5e0');
    const dashed=node.type==='sol'?'stroke-dasharray="5,4"':'';
    visChildren.forEach(child=>{
      if(!isVisible(child)) return;
      const cx=child.x+NW/2,cy=child.y,my=(py+cy)/2;
      lines+=`<path d="M${px} ${py} C${px} ${my},${cx} ${my},${cx} ${cy}" fill="none" stroke="${color}" stroke-width="2" ${dashed} opacity="0.5"/>`;
      drawEdges(child);
    });
  }
  drawEdges(treeRoot);
  svg.innerHTML=lines;

  // Nodes
  let html='';
  nodes.forEach(node=>{
    const h=nh(node);
    const v=node.type==='opp'?(votes[node.id]||{count:0,voted:false}):{count:0,voted:false};
    const hasKids=getVisibleChildren(node).length>0||(!isCollapsed(node)&&node.children.length>0);
    const canExpand=node.children.length>0&&!(node.type==='opp'&&!showLayers.sol)&&!(node.type==='sol'&&!showLayers.exp);
    const expandHint=canExpand?(node.collapsed?'▸ expandir':'▾ colapsar'):'';

      style+=`background:${pc.bg};color:${pc.text};padding:9px 12px;`;

    }else if(node.type==='opp'){

      inner=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:3px;margin-bottom:3px;">
        <div style="display:flex;gap:2px;flex-wrap:wrap;">
          <span class="tag tag-${node.opp.type}" style="font-size:7px;">${typeIcon[node.opp.type]} ${typeLabel[node.opp.type]}</span>

               <span class="badge ${effCss[sol.effort]}">${effLabel[sol.effort]}</span>
             </div>
             ${canExpand?`<div style="font-size:7px;color:#a0aec0;margin-top:2px;">${expandHint} · ${node.children.length} exp.</div>`:''}`;
      style+=`background:#fff;border:1.5px solid #e2e8f0;padding:7px 9px;`;

    }else if(node.type==='exp'){
      const exp=node.exp;
      inner=`<div style="font-size:7px;font-weight:700;color:#4299e1;margin-bottom:1px;">${node.id} · ⏱ ${exp.days}d</div>
             <div style="font-size:9px;font-weight:600;line-height:1.3;color:#2d3748;">${exp.title}</div>`;
      style+=`background:#f7fafc;border:1px solid #e2e8f0;padding:6px 8px;`;
    }

    html+=`<div class="${cls}" style="${style}" onclick="toggleNode('${node.id}')">${inner}</div>`;
  });
  document.getElementById('treeNodes').innerHTML=html;

  if(!_treeFitted){_treeFitted=true;setTimeout(fitView,60);}
}

// ── INIT ──
loadVotes();
</script>
</body>
</html>
