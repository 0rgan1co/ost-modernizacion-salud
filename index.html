*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,sans-serif;background:#f0f4f8;color:var(--gray-900);line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-700) 60%,var(--blue-500) 100%);color:#fff;padding:11px 16px 10px;flex-shrink:0;}
.header h1{font-size:14px;font-weight:800;letter-spacing:-.2px;}
.header .sub{font-size:10px;opacity:.7;margin-top:1px;}
.outcome-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:3px 10px;font-size:9px;font-weight:600;margin-top:5px;}

/* ── TABS ── */
.tabs{background:#fff;border-bottom:2px solid var(--gray-300);display:flex;flex-shrink:0;}
.tab{flex:1;padding:9px 6px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray-500);border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab.active{color:var(--blue-700);border-color:var(--blue-600);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green-500);}
.sync-dot.offline{background:var(--gray-400);}

/* ── PRIORITY VIEW ── */
.prio-scroll{flex:1;overflow-y:auto;padding:10px 12px 24px;}
.prio-hint{background:linear-gradient(135deg,#ebf8ff 0%,#e6fffa 100%);border-radius:9px;padding:10px 13px;margin-bottom:10px;border-left:3px solid var(--blue-500);}
.prio-hint p{font-size:11px;color:var(--gray-700);line-height:1.5;}
.prio-hint strong{color:var(--blue-700);}
.prio-section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);padding:6px 2px 4px;}
.prio-card{background:#fff;border-radius:9px;margin-bottom:6px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);border:1.5px solid var(--gray-200);cursor:pointer;transition:.15s;}
.prio-card.top{border-color:var(--red-300);background:#fff8f8;}
.prio-card:active{background:var(--gray-100);}
.prio-rank{font-size:16px;font-weight:900;color:var(--gray-300);width:22px;text-align:center;flex-shrink:0;line-height:1;}
.prio-rank.top{color:var(--red-400);}
.prio-body{flex:1;min-width:0;}
.prio-title{font-size:12px;font-weight:700;color:var(--gray-900);line-height:1.3;}
.prio-badges{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 5px;border-radius:4px;white-space:nowrap;}
.tag-pain{background:var(--red-100);color:var(--red-700);}
.tag-desire{background:var(--green-100);color:var(--green-700);}
.tag-need{background:var(--purple-100);color:var(--purple-700);}
.tag-ph1{background:var(--green-100);color:var(--green-700);}
.tag-ph2{background:var(--blue-100);color:var(--blue-700);}
.tag-ph3{background:var(--orange-100);color:var(--orange-700);}
.vote-btn{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:7px;transition:.15s;flex-shrink:0;}
.vote-btn:hover{background:var(--red-100);}
.vote-btn.voted{background:var(--red-100);}
.heart{font-size:18px;line-height:1;}
.vote-count{font-size:9px;font-weight:700;color:var(--gray-500);}
.vote-btn.voted .vote-count{color:var(--red-600);}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.5)}100%{transform:scale(1)}}
.vote-btn.voted .heart{animation:heartPop .3s ease;}

/* ── TREE VIEW ── */
.tree-view{flex:1;overflow:hidden;position:relative;background:#dde3ec;}
.tree-stage{position:absolute;inset:0;overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none;}
.tree-stage.panning{cursor:grabbing;}
.tree-canvas{position:absolute;top:0;left:0;transform-origin:0 0;}
.tree-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}
.tree-nodes{position:absolute;top:0;left:0;}

/* TREE NODES */
.tn{position:absolute;border-radius:10px;cursor:pointer;transition:box-shadow .15s;font-family:'Inter',-apple-system,sans-serif;}
.tn:hover{box-shadow:0 0 0 3px rgba(66,153,225,.35);}
.tn.voted-node{box-shadow:0 0 0 3px rgba(229,62,62,.35);}
.tn.expanded-border{box-shadow:0 0 0 2px rgba(99,179,237,.6);}
.badge{font-size:8px;font-weight:600;padding:2px 5px;border-radius:3px;white-space:nowrap;}
.conf-high{background:var(--green-100);color:var(--green-700);}
.conf-med{background:var(--orange-100);color:var(--orange-700);}
.conf-low{background:var(--red-100);color:var(--red-700);}
.eff-low{background:#e0f7fa;color:#006064;}
.eff-med{background:#fff3e0;color:#e65100;}
.eff-high{background:#fce4ec;color:#c62828;}

/* ZOOM CONTROLS */
.zoom-wrap{position:absolute;bottom:14px;right:12px;display:flex;flex-direction:column;gap:5px;z-index:10;}
.zoom-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--gray-300);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.14);font-family:inherit;font-weight:700;color:var(--gray-700);}
.zoom-btn:active{background:var(--gray-100);}
.tree-legend{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(26,54,93,.82);color:#fff;font-size:10px;padding:4px 12px;border-radius:14px;pointer-events:none;z-index:10;white-space:nowrap;}

const effLabel={low:'Esfuerzo ↓',medium:'Esfuerzo →',high:'Esfuerzo ↑↑'};
const effCss={low:'eff-low',medium:'eff-med',high:'eff-high'};

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(tab){
  activeTab=tab;
  document.getElementById('tab-prio').classList.toggle('active',tab==='prio');
  document.getElementById('tab-tree').classList.toggle('active',tab==='tree');
  document.getElementById('view-prio').style.display=tab==='prio'?'flex':'none';
  document.getElementById('view-tree').style.display=tab==='tree'?'block':'none';
  if(tab==='tree') renderTree();
}

// ══════════════════════════════════════════
// SUPABASE VOTES
// ══════════════════════════════════════════
async function loadVotes(){
  try{
    const opps=await sbFetch('/rest/v1/ost_opportunities?select=id,votes&order=id');
    const myVotes=await sbFetch('/rest/v1/ost_votes?select=opportunity_id&voter_id=eq.'+VOTER_ID);
    const mySet=new Set((myVotes||[]).map(v=>v.opportunity_id));
    votes={};
    (opps||[]).forEach(o=>{votes[o.id]={count:o.votes,voted:mySet.has(o.id)};});
    const existing=new Set((opps||[]).map(o=>o.id));
    const toInsert=DATA.opportunities.filter(o=>!existing.has(o.id)).map(o=>({id:o.id,phase_id:String(o.phase),title:o.title,type:o.type,quote:o.quote,votes:0}));
    if(toInsert.length) await sbFetch('/rest/v1/ost_opportunities',{method:'POST',body:JSON.stringify(toInsert),headers:{'Prefer':'resolution=ignore-duplicates,return=minimal'}});
    document.getElementById('syncDot').className='sync-dot';
  }catch(e){
    console.warn('Supabase offline:',e.message);
    DATA.opportunities.forEach(o=>{if(!votes[o.id])votes[o.id]={count:0,voted:false};});
  }
  renderPrio();
}

async function doVote(oppId,inTree){
  const v=votes[oppId]||{count:0,voted:false};
  votes[oppId]={count:v.count+(v.voted?-1:1),voted:!v.voted};
  renderPrio();
  if(activeTab==='tree'||inTree) renderTree();
  try{
    if(v.voted){
      await sbFetch('/rest/v1/ost_votes?opportunity_id=eq.'+oppId+'&voter_id=eq.'+VOTER_ID,{method:'DELETE'});
      await sbFetch('/rest/v1/rpc/decrement_vote',{method:'POST',body:JSON.stringify({opp_id:oppId})});
    }else{
      await sbFetch('/rest/v1/ost_votes',{method:'POST',body:JSON.stringify({opportunity_id:oppId,voter_id:VOTER_ID})});
      await sbFetch('/rest/v1/rpc/increment_vote',{method:'POST',body:JSON.stringify({opp_id:oppId})});
    }
  }catch(err){votes[oppId]=v;renderPrio();if(activeTab==='tree')renderTree();}
}

// ══════════════════════════════════════════
// PRIORITY VIEW
// ══════════════════════════════════════════
function renderPrio(){
  const sorted=[...DATA.opportunities].sort((a,b)=>{
    const va=votes[a.id]||{count:0};
    const vb=votes[b.id]||{count:0};
    return vb.count-va.count||a.id.localeCompare(b.id);
  });
  const totalVotes=Object.values(votes).reduce((s,v)=>s+(v.count||0),0);
  let html='';
  if(totalVotes===0){
    html+=`<div class="prio-hint"><p><strong>¿Cuáles son los problemas más urgentes?</strong><br>Votá ❤️ los que más impactan. Los más votados aparecen arriba y guían la prioridad del OST.</p></div>`;
  }else{
    html+=`<div class="prio-hint"><p><strong>${totalVotes} voto${totalVotes!==1?'s':''} registrados.</strong> Tocá 🌳 Ver árbol OST para explorar las soluciones a los problemas prioritarios.</p></div>`;
  }
  html+=`<div class="prio-section-hdr">Problemas — ordená por importancia</div>`;
  sorted.forEach((opp,i)=>{
    const v=votes[opp.id]||{count:0,voted:false};
    const isTop=v.count>0&&i<3;
    const ph=DATA.phases.find(p=>p.id===opp.phase);
    html+=`<div class="prio-card${isTop?' top':''}" onclick="goToTree('${opp.id}')">
      <div class="prio-rank${isTop?' top':''}">${i+1}</div>
      <div class="prio-body">
        <div class="prio-title">${opp.title}</div>
        <div class="prio-badges">
          <span class="tag tag-${opp.type}">${typeIcon[opp.type]} ${typeLabel[opp.type]}</span>
          <span class="tag tag-ph${opp.phase}">${ph.icon} ${ph.name}</span>
        </div>
      </div>
      <button class="vote-btn${v.voted?' voted':''}" onclick="event.stopPropagation();doVote('${opp.id}',false)">
        <span class="heart">${v.voted?'❤️':'🤍'}</span>
        <span class="vote-count">${v.count}</span>
      </button>
    </div>`;
  });
  document.getElementById('prioList').innerHTML=html;
}

function goToTree(oppId){
  switchTab('tree');
  setTimeout(()=>{
    if(!treeRoot)return;
    const node=findNode(treeRoot,oppId);
    if(node){node.collapsed=false;renderTree();centerNode(node);}
  },120);
}

// ══════════════════════════════════════════
// TREE ENGINE
// ══════════════════════════════════════════
const NW=190; // node width
const VG=56;  // vertical gap between levels
const HG=12;  // horizontal gap between siblings

const NH={outcome:54,phase:62,opp:78,sol:72,exp:58};

function buildTreeData(){
  return {
    id:'outcome',type:'outcome',
    collapsed:false,
    children:DATA.phases.map(ph=>({
      id:'ph-'+ph.id,type:'phase',phase:ph,
      collapsed:false,
      children:DATA.opportunities.filter(o=>o.phase===ph.id).map(opp=>({
        id:opp.id,type:'opp',opp:opp,
        collapsed:true,
        children:opp.solutions.map(sol=>({
          id:sol.id,type:'sol',sol:sol,
          collapsed:true,
          children:sol.experiments.map(exp=>({
            id:exp.id,type:'exp',exp:exp,
            collapsed:true,children:[]
          }))
        }))
      }))
    }))
  };
}

function nh(node){return NH[node.type]||68;}

function layout(node,startX,y){
  node.y=y;
  const visChildren=node.collapsed?[]:node.children;
  if(!visChildren.length){node.x=startX;node._w=NW+HG;return node._w;}
  let cx=startX,totalW=0;
  visChildren.forEach(child=>{
    const w=layout(child,cx,y+nh(node)+VG);
    cx+=w;totalW+=w;
  });
  node.x=startX+(totalW-HG)/2-NW/2;
  node._w=Math.max(totalW,NW+HG);
  return node._w;
}

function allNodes(node,acc=[]){
  acc.push(node);
  if(!node.collapsed)node.children.forEach(c=>allNodes(c,acc));
  return acc;
}

function findNode(node,id){
  if(node.id===id)return node;
  for(const c of node.children){const f=findNode(c,id);if(f)return f;}
  return null;
}

// ── PAN / ZOOM ──
let zoom=1,panX=20,panY=20,isDragging=false,dragStart={x:0,y:0};
let lastTouchDist=null,lastTouchMid={x:0,y:0},prevTouches=[];

function applyT(){
  document.getElementById('treeCanvas').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
}
function zoomIn(){zoom=Math.min(3,zoom*1.2);applyT();}
function zoomOut(){zoom=Math.max(0.1,zoom/1.2);applyT();}
function fitView(){
  const stage=document.getElementById('treeStage');
  const sw=stage.clientWidth,sh=stage.clientHeight;
  const nodes=allNodes(treeRoot);
  const minX=Math.min(...nodes.map(n=>n.x));
  const maxX=Math.max(...nodes.map(n=>n.x+NW));
  const minY=Math.min(...nodes.map(n=>n.y));
  const maxY=Math.max(...nodes.map(n=>n.y+nh(n)));
  const tw=maxX-minX+40,th=maxY-minY+40;
  zoom=Math.min(sw/tw,sh/th,1.2)*0.88;
  panX=(sw-(maxX-minX)*zoom)/2-minX*zoom;
  panY=18;
  applyT();
}
function centerNode(node){
  const stage=document.getElementById('treeStage');
  panX=stage.clientWidth/2-(node.x+NW/2)*zoom;
  panY=stage.clientHeight/3-node.y*zoom;
  applyT();
}

function initPanZoom(){
  const stage=document.getElementById('treeStage');
  stage.addEventListener('mousedown',e=>{
    if(e.target.closest('.tn'))return;
    isDragging=true;
    dragStart={x:e.clientX-panX,y:e.clientY-panY};
    stage.classList.add('panning');
  });
  document.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    panX=e.clientX-dragStart.x;panY=e.clientY-dragStart.y;applyT();
  });
  document.addEventListener('mouseup',()=>{
    isDragging=false;
    const s=document.getElementById('treeStage');
    if(s)s.classList.remove('panning');
  });
  stage.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.12:0.9;
    zoom=Math.max(0.1,Math.min(3,zoom*f));applyT();
  },{passive:false});
  // Touch pan + pinch
  stage.addEventListener('touchstart',e=>{
    prevTouches=[...e.touches].map(t=>({x:t.clientX,y:t.clientY}));
    if(e.touches.length===2){
      lastTouchDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      lastTouchMid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    }
  },{passive:true});
  stage.addEventListener('touchmove',e=>{
    e.preventDefault();
    const tArr=[...e.touches];
    if(tArr.length===2){
      const dist=Math.hypot(tArr[1].clientX-tArr[0].clientX,tArr[1].clientY-tArr[0].clientY);
      const mid={x:(tArr[0].clientX+tArr[1].clientX)/2,y:(tArr[0].clientY+tArr[1].clientY)/2};
      if(lastTouchDist&&lastTouchDist>0){
        const scale=dist/lastTouchDist;
        zoom=Math.max(0.1,Math.min(3,zoom*scale));
      }
      if(lastTouchMid){panX+=mid.x-lastTouchMid.x;panY+=mid.y-lastTouchMid.y;}
      lastTouchDist=dist;lastTouchMid=mid;
      applyT();
    }else if(tArr.length===1&&prevTouches.length>=1){
      panX+=tArr[0].clientX-prevTouches[0].x;
      panY+=tArr[0].clientY-prevTouches[0].y;
      applyT();
    }
    prevTouches=tArr.map(t=>({x:t.clientX,y:t.clientY}));
  },{passive:false});
  stage.addEventListener('touchend',e=>{
    prevTouches=[...e.touches].map(t=>({x:t.clientX,y:t.clientY}));
    if(e.touches.length<2){lastTouchDist=null;lastTouchMid=null;}
  },{passive:true});
}

function toggleNode(nodeId){
  if(!treeRoot)return;
  const node=findNode(treeRoot,nodeId);
  if(node&&node.children.length){node.collapsed=!node.collapsed;renderTree();}
}

// ── RENDER TREE ──
function renderTree(){
  if(!treeRoot){treeRoot=buildTreeData();}
  if(!_treeInited){_treeInited=true;initPanZoom();}

  const totalW=layout(treeRoot,20,20);
  const nodes=allNodes(treeRoot);
  const maxY=Math.max(...nodes.map(n=>n.y+nh(n)))+30;
  const canvasW=Math.max(totalW+40,800);

  // SVG lines
  const svg=document.getElementById('treeSvg');
  svg.setAttribute('width',canvasW);svg.setAttribute('height',maxY);
  svg.style.width=canvasW+'px';svg.style.height=maxY+'px';

  let lines='';
  function drawEdges(node){
    if(node.collapsed)return;
    const px=node.x+NW/2,py=node.y+nh(node);
    const color=node.type==='phase'?phCols[node.phase.id]?.bg:(node.type==='opp'?'#a0aec0':'#cbd5e0');
    node.children.forEach(child=>{
      const cx=child.x+NW/2,cy=child.y;
      const my=(py+cy)/2;
      lines+=`<path d="M${px} ${py} C${px} ${my},${cx} ${my},${cx} ${cy}" fill="none" stroke="${color}" stroke-width="2" stroke-dasharray="${node.type==='sol'?'5,4':''}" opacity="0.55"/>`;
      drawEdges(child);
    });
  }
  drawEdges(treeRoot);
  svg.innerHTML=lines;

  // Nodes
  let html='';
  nodes.forEach(node=>{
    const h=nh(node);
    const v=node.type==='opp'?(votes[node.id]||{count:0,voted:false}):{count:0,voted:false};
    const hasKids=node.children.length>0;
    const expandHint=hasKids?(node.collapsed?'▸ ver más':'▾ colapsar'):'';
    let inner='',style=`left:${node.x}px;top:${node.y}px;width:${NW}px;`;
    let cls='tn';

    if(node.type==='outcome'){
      inner=`<div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.75;margin-bottom:3px;">🎯 Outcome del sistema</div>
             <div style="font-size:11px;font-weight:700;line-height:1.3;">Reducir gasto ≥30% · Cero errores · Facturación +60%</div>`;
      style+=`background:linear-gradient(135deg,#1a365d,#2b6cb0);color:#fff;padding:10px 13px;`;

    }else if(node.type==='phase'){
      const pc=phCols[node.phase.id];
      const oCount=node.children.length;
      inner=`<div style="font-size:12px;font-weight:800;margin-bottom:2px;">${node.phase.icon} ${node.phase.name}</div>
             <div style="font-size:9px;opacity:.8;">Sprint ${node.phase.sprint}d · ${oCount} problema${oCount!==1?'s':''}</div>
             ${hasKids?`<div style="font-size:8px;opacity:.6;margin-top:4px;">${expandHint}</div>`:''}`;
      style+=`background:${pc.bg};color:${pc.text};padding:10px 13px;`;

    }else if(node.type==='opp'){
      if(!node.collapsed)cls+=' expanded-border';
      if(v.count>0)cls+=' voted-node';
      const ph=DATA.phases.find(p=>p.id===node.opp.phase);
      inner=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:4px;">
        <div style="display:flex;gap:3px;flex-wrap:wrap;">
          <span class="tag tag-${node.opp.type}" style="font-size:7px;">${typeIcon[node.opp.type]} ${typeLabel[node.opp.type]}</span>
          <span class="tag" style="background:#e2e8f0;color:#4a5568;font-size:7px;">${node.id}</span>
        </div>
        <button class="vote-btn${v.voted?' voted':''}" onclick="event.stopPropagation();doVote('${node.id}',true)" style="padding:2px 4px;border-radius:5px;">
          <span class="heart" style="font-size:13px;">${v.voted?'❤️':'🤍'}</span>
          <span class="vote-count">${v.count}</span>
        </button>
      </div>
      <div style="font-size:10px;font-weight:700;line-height:1.35;color:#1a202c;">${node.opp.title}</div>
      ${hasKids?`<div style="font-size:8px;color:#a0aec0;margin-top:4px;">${expandHint} · ${node.children.length} soluciones</div>`:''}`;
      style+=`background:#fff;border:1.5px solid #e2e8f0;padding:8px 10px;`;

    }else if(node.type==='sol'){
      if(!node.collapsed&&node.children.length)cls+=' expanded-border';
      const sol=node.sol;
      inner=`<div style="font-size:7px;font-weight:700;color:#2b6cb0;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;">${node.id}</div>
             <div style="font-size:10px;font-weight:700;line-height:1.3;color:#1a202c;">${sol.title}</div>
             <div style="display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;">
               <span class="badge ${confCss[sol.confidence]}">${confLabel[sol.confidence]}</span>
               <span class="badge ${effCss[sol.effort]}">${effLabel[sol.effort]}</span>
             </div>
             ${hasKids?`<div style="font-size:7px;color:#a0aec0;margin-top:3px;">${expandHint} · ${node.children.length} exp.</div>`:''}`;
      style+=`background:#fff;border:1.5px solid #e2e8f0;padding:8px 10px;`;

    }else if(node.type==='exp'){
      const exp=node.exp;
      inner=`<div style="font-size:7px;font-weight:700;color:#4299e1;margin-bottom:2px;">${node.id} · ⏱ ${exp.days}d</div>
             <div style="font-size:9px;font-weight:600;line-height:1.35;color:#2d3748;">${exp.title}</div>`;
      style+=`background:#f7fafc;border:1px solid #e2e8f0;padding:7px 9px;`;
    }

    html+=`<div class="${cls}" style="${style}" onclick="toggleNode('${node.id}')">${inner}</div>`;
  });
  document.getElementById('treeNodes').innerHTML=html;

  if(!_treeFitted){_treeFitted=true;setTimeout(fitView,60);}
}

// ── INIT ──
loadVotes();
</script>
